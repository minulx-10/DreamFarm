name: Build & Release (Windows EXE & Android APK)

# 태그를 push하면 Windows EXE와 Android APK를 빌드해 GitHub 릴리스로 올린다.
#  - 안정 태그   (예: v1.0.5)        → 정식 릴리스 ('Latest'로 표시)
#  - 개발 태그   (예: v1.0.5-dev.1)  → 프리릴리스 (테스터용, 'Latest' 아님)
# Actions 탭에서 수동 실행(workflow_dispatch)도 가능.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # 릴리스 생성 및 자산 업로드 권한

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # exe 파일명은 ASCII로.
      - name: EXE 빌드 (PyInstaller onefile)
        run: >
          pyinstaller --noconfirm --clean --onefile --windowed
          --name DreamFarm
          --add-data "core/Galmuri11.ttf;core"
          --add-data "core/dad.png;core"
          --add-data "core/field_bed.jpg;core"
          --add-data "core/logo.png;core"
          main.py

      - name: 빌드 산출물 업로드 (아티팩트)
        uses: actions/upload-artifact@v4
        with:
          name: DreamFarm-windows
          path: dist/DreamFarm.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      # Buildozer 캐시 설정으로 빌드 속도 개선
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: .buildozer_global
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}

      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: master

      - name: 빌드 산출물 업로드 (아티팩트)
        uses: actions/upload-artifact@v4
        with:
          name: DreamFarm-android
          path: ${{ steps.buildozer.outputs.filename }}

  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: 빌드 다운로드 (Windows)
        uses: actions/download-artifact@v4
        with:
          name: DreamFarm-windows
          path: dist

      - name: 빌드 다운로드 (Android)
        uses: actions/download-artifact@v4
        with:
          name: DreamFarm-android
          path: dist

      - name: 파일 이름 찾기 및 정리
        id: files
        shell: bash
        run: |
          APK_FILE=$(find dist -name "*.apk" | head -n 1)
          echo "apk_file=$APK_FILE" >> "$GITHUB_OUTPUT"

      - name: 릴리스 채널 판별
        id: channel
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-dev* || "${GITHUB_REF_NAME}" == *-beta* || "${GITHUB_REF_NAME}" == *-rc* ]]; then
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: GitHub 릴리스 생성 및 자산 첨부
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/DreamFarm.exe
            ${{ steps.files.outputs.apk_file }}
          generate_release_notes: true
          prerelease: ${{ steps.channel.outputs.prerelease }}
          make_latest: ${{ steps.channel.outputs.make_latest }}
