name: Build & Release (Windows EXE & Android APK)

# 태그를 push하면 Windows EXE와 Android APK를 빌드해 GitHub 릴리스로 올린다.
#  - 안정 태그   (예: v1.0.5)        → 정식 릴리스 ('Latest'로 표시)
#  - 개발 태그   (예: v1.0.5-dev.1)  → 프리릴리스 (테스터용, 'Latest' 아님)
# Actions 탭에서 수동 실행(workflow_dispatch)도 가능.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # 릴리스 생성 및 자산 업로드 권한

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # exe 파일명은 ASCII로.
      - name: EXE 빌드 (PyInstaller onefile)
        run: >
          pyinstaller --noconfirm --clean --onefile --windowed
          --name DreamFarm
          --add-data "core/Galmuri11.ttf;core"
          --add-data "core/dad.png;core"
          --add-data "core/field_bed.jpg;core"
          --add-data "core/logo.png;core"
          main.py

      - name: 빌드 산출물 업로드 (아티팩트)
        uses: actions/upload-artifact@v4
        with:
          name: DreamFarm-windows
          path: dist/DreamFarm.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Buildozer NDK/SDK 및 캐시 폴더들 캐싱하여 속도 최적화
      - name: Cache Buildozer directories
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            .buildozer_global
            ~/.gradle
          key: buildozer-v3-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v3-${{ runner.os }}-

      - name: 의존성 패키지 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool libtool-bin libltdl-dev m4 autotools-dev autoconf-archive \
            pkg-config zlib1g-dev libncurses-dev libsqlite3-dev libgdbm-dev libssl-dev libffi-dev \
            uuid-dev alsa-utils libasound2-dev libbz2-dev libreadline-dev liblzma-dev tk-dev \
            gettext cmake

      - name: Buildozer 및 Cython 설치
        run: |
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer

      - name: Build APK with Buildozer
        run: |
          # Unset pre-installed runner Android SDK/NDK variables to let Buildozer manage them cleanly in the workspace
          unset ANDROID_HOME
          unset ANDROID_SDK_ROOT
          unset ANDROID_NDK
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_ROOT
          unset ANDROID_NDK_LATEST_HOME
          yes | buildozer android debug

      # 빌드된 APK 파일 위치 찾기 (보통 bin/ 하위에 생성됨)
      - name: APK 파일명 확인
        id: apk_find
        run: |
          APK_PATH=$(find bin/ -name "*.apk" | head -n 1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: 빌드 산출물 업로드 (아티팩트)
        uses: actions/upload-artifact@v4
        with:
          name: DreamFarm-android
          path: ${{ steps.apk_find.outputs.apk_path }}

  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: 빌드 다운로드 (Windows)
        uses: actions/download-artifact@v4
        with:
          name: DreamFarm-windows
          path: dist

      - name: 빌드 다운로드 (Android)
        uses: actions/download-artifact@v4
        with:
          name: DreamFarm-android
          path: dist

      - name: 파일 이름 찾기 및 정리
        id: files
        shell: bash
        run: |
          APK_FILE=$(find dist -name "*.apk" | head -n 1)
          echo "apk_file=$APK_FILE" >> "$GITHUB_OUTPUT"

      - name: CHANGELOG에서 릴리스 노트 추출
        id: notes
        shell: bash
        run: |
          python -c "
          import re
          content = open('CHANGELOG.md', encoding='utf-8').read()
          match = re.search(r'## v[^\n]+.*?(?=\n## v|$)', content, re.S)
          if match:
              with open('release_notes.md', 'w', encoding='utf-8') as f:
                  f.write(match.group(0))
          "

      - name: 릴리스 채널 판별
        id: channel
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-dev* || "${GITHUB_REF_NAME}" == *-beta* || "${GITHUB_REF_NAME}" == *-rc* ]]; then
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: GitHub 릴리스 생성/갱신 및 자산 첨부
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            dist/DreamFarm.exe
            ${{ steps.files.outputs.apk_file }}
          prerelease: ${{ steps.channel.outputs.prerelease }}
          makeLatest: ${{ steps.channel.outputs.make_latest }}
          allowUpdates: true
